<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de pedidos</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="panel">
      <header class="panel__header">
        <div>
          <p class="eyebrow">Pedidos</p>
          <h1>Pedido final</h1>
        </div>
        <div class="metrics" aria-label="Resumen de pedidos">
          <div class="metric">
            <span id="totalOrders">0</span>
            <small>pedidos</small>
          </div>
          <div class="metric">
            <span id="totalLines">0</span>
            <small>lineas/productos</small>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="Busqueda de pedidos">
        <label class="search">
          <span>Buscar</span>
          <input id="searchInput" type="search" placeholder="Telefono, pedido o producto" autocomplete="off">
        </label>
      </section>

      <p id="statusMessage" class="status" role="status">Cargando datos...</p>

      <section id="ordersList" class="orders" aria-label="Listado de pedidos">
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
