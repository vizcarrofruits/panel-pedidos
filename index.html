<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de pedidos</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="panel">
      <header class="panel__header">
        <div>
          <p class="eyebrow">Pedidos</p>
          <h1>Panel de seguimiento</h1>
        </div>
        <div class="metric" aria-label="Pedidos pendientes">
          <span id="pendingCount">0</span>
          <small>pendientes</small>
        </div>
      </header>

      <section class="toolbar" aria-label="Filtros de pedidos">
        <div class="tabs" role="tablist" aria-label="Estado">
          <button class="tab is-active" type="button" data-filter="todos">Todos</button>
          <button class="tab" type="button" data-filter="pendientes">Pendientes</button>
        </div>
        <label class="search">
          <span>Buscar</span>
          <input id="searchInput" type="search" placeholder="Cliente o telefono" autocomplete="off">
        </label>
      </section>

      <p id="statusMessage" class="status" role="status">Cargando datos...</p>

      <section class="table-wrap" aria-label="Listado de pedidos">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>Telefono</th>
              <th>Mensaje</th>
              <th>Estado</th>
              <th>Accion</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
